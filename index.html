<body >
    <div class="container">
        <div class="book-display"></div>
        <button class="add-btn">Add Book</button>
        <div class="book-container"></div>
        <form method="#" class="form">
            <caption>Enter Book Detail: </caption>
            <div class="titl">
            <label for="title">Book Title: </label>
            <input type="text"  class="title" id="title" required>
            </div>  
            <div class="aut">   
            <label for="author">Book Author: </label>
            <input type="text"  class="author" id="author" required>
            </div>
            <div class="pag">
            <label for="pages">Number of pages: </label>
            <input type="number"  class="number-of-pages" id="pages" required>
            </div>

            </div> -->
